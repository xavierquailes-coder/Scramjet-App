<body style="margin:0;background:#000;color:#fff;font-family:monospace;display:grid;place-items:center;height:100vh">Opening SquiddCoreOS Games...<script id="sq-true-32px-cursor-patch">
(function(){
'use strict';
var KEY='squiddcoreCursorChoiceV1', CUSTOM='squiddcoreCustomCursorV1';
var defs={
 netheriteSword:{url:'cursor-assets/netherite-sword-normal-32.png',hot:'1 1'},
 babyZombie:{url:'cursor-assets/baby-zombie-32.png',hot:'1 1'},
 diamondSword:{url:'cursor-assets/diamond-sword-32.png',hot:'1 1'},
 netheritePickaxe:{url:'cursor-assets/netherite-pickaxe-32.png',hot:'2 2'}
};
var clickable='a,button,[role="button"],label,select,summary,input[type="button"],input[type="submit"],input[type="checkbox"],input[type="radio"],input[type="file"],input[type="range"],.clickable,.app-icon,.game-card,.partner-card,.browser-tab,.theme-btn,.slider,.sq-cursor-option';
var clickChildren=clickable.split(',').map(function(s){return s.trim()+' *'}).join(',');
function getStyle(){var s=document.getElementById('sqTrue32CursorStyle');if(!s){s=document.createElement('style');s.id='sqTrue32CursorStyle';document.head.appendChild(s)}return s}
function apply(id){
 id=id||localStorage.getItem(KEY)||'default';
 var value='';
 if(id==='custom'){
   var custom=localStorage.getItem(CUSTOM); if(custom)value='url("'+custom+'") 0 0, auto';
 }else if(defs[id]) value='url("'+defs[id].url+'") '+defs[id].hot+', auto';
 if(!value){getStyle().textContent='';return;}
 getStyle().textContent='html,body,body *{cursor:'+value+' !important}'+clickable+','+clickChildren+'{cursor:'+value+' !important}input:not([type="button"]):not([type="submit"]):not([type="checkbox"]):not([type="radio"]):not([type="file"]):not([type="range"]),textarea,[contenteditable="true"]{cursor:text !important}';
 document.querySelectorAll('.sq-cursor-option').forEach(function(x){x.classList.toggle('active',x.dataset.cursor===id)});
}
function bind(){
 document.querySelectorAll('.sq-cursor-option').forEach(function(b){if(b.dataset.true32Bound)return;b.dataset.true32Bound='1';b.addEventListener('click',function(){var id=b.dataset.cursor;if(id==='custom'&&!localStorage.getItem(CUSTOM))return;localStorage.setItem(KEY,id);setTimeout(function(){apply(id)},0)},true)});
 apply();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bind);else bind();
window.addEventListener('load',function(){setTimeout(bind,100)});
new MutationObserver(bind).observe(document.documentElement,{childList:true,subtree:true});
window.addEventListener('storage',function(e){if(e.key===KEY||e.key===CUSTOM)apply()});
window.sqApplyRealCursor=apply;
})();
</script>

<script id="sq-direct-ddg-worker-only" type="application/x-disabled">
(function(){
  'use strict';
  var WORKER='https://proxytesting.xavierquailes.workers.dev/';

  function isUrl(value){
    value=String(value||'').trim();
    return /^https?:\/\//i.test(value) || (/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(value) && !/\s/.test(value));
  }

  function cleanInput(value){
    return String(value||'').trim().replace(/^[\"']+|[\"']+$/g,'');
  }

  function normalizeUrl(value){
    value=cleanInput(value);
    return /^https?:\/\//i.test(value) ? value : 'https://' + value;
  }

  function clearCards(){
    ['miicoreSearchResults','miiInternalProxyPane','miiInternalNoTabResults','miiDuckOnlyResults','miiTikTokSearchPage'].forEach(function(id){
      var el=document.getElementById(id);
      if(el){el.classList.remove('show');el.style.display='none';}
    });
  }

  function updateTab(displayValue, label){
    try{
      if(typeof getActiveBrowserTab==='function'){
        var tab=getActiveBrowserTab();
        if(tab){tab.url=displayValue;tab.title=label.length>24?label.slice(0,24)+'…':label;}
      }
      if(typeof renderBrowserTabs==='function')renderBrowserTabs();
    }catch(_){ }
  }

  function run(raw){
    raw=cleanInput(raw);
    if(!raw)return;

    clearCards();
    var frame=document.getElementById('browserFrame');
    var addr=document.getElementById('browserAddress');
    if(!frame)return;
    try{frame.removeAttribute('srcdoc');}catch(_){ }

    if(isUrl(raw)){
      var siteUrl=normalizeUrl(raw);
      if(addr)addr.value=siteUrl;
      frame.src=WORKER+'?url='+encodeURIComponent(siteUrl);
      updateTab(siteUrl, siteUrl);
      return;
    }

    var displaySearch='https://duckduckgo.com/?q='+encodeURIComponent(raw);
    var proxiedSearch='https://html.duckduckgo.com/html/?q='+encodeURIComponent(raw);
    if(addr)addr.value=displaySearch;
    frame.src=WORKER+'?url='+encodeURIComponent(proxiedSearch);
    updateTab(displaySearch, raw);
  }

  function bind(){
    var go=document.getElementById('browserGo');
    var addr=document.getElementById('browserAddress');
    var home=document.getElementById('homeSearch');

    if(go&&!go.__sqSafeRouter){
      go.__sqSafeRouter=1;
      go.addEventListener('click',function(event){
        event.preventDefault();
        event.stopImmediatePropagation();
        run((document.getElementById('browserAddress')||{}).value||'');
      },true);
    }

    if(addr&&!addr.__sqSafeRouter){
      addr.__sqSafeRouter=1;
      addr.addEventListener('keydown',function(event){
        if(event.key==='Enter'){
          event.preventDefault();
          event.stopImmediatePropagation();
          run(addr.value);
        }
      },true);
    }

    if(home&&!home.__sqSafeRouter){
      home.__sqSafeRouter=1;
      home.addEventListener('keydown',function(event){
        if(event.key==='Enter'){
          event.preventDefault();
          event.stopImmediatePropagation();
          if(typeof showBrowser==='function')showBrowser();
          setTimeout(function(){run(home.value);},0);
        }
      },true);
    }

    window.loadBrowser=run;
    window.sqDirectDuckDuckGoSearch=run;
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bind,{once:true});
  else bind();
  window.addEventListener('load',bind,{once:true});
})();
</script>

<script id="sq-browser-single-worker-route-js">
(function(){
  'use strict';
  var WORKER='https://proxytesting.xavierquailes.workers.dev/';
  function $(id){return document.getElementById(id)}
  function clean(v){return String(v||'').trim().replace(/^[\s'\"]+|[\s'\"]+$/g,'')}
  function isUrl(v){
    v=clean(v);
    return /^https?:\/\//i.test(v)||/^localhost(?::\d+)?(?:\/|$)/i.test(v)||/^(?:[a-z0-9-]+\.)+[a-z]{2,}(?::\d+)?(?:\/|$)/i.test(v);
  }
  function normalize(v){
    v=clean(v);
    if(!/^https?:\/\//i.test(v)) v='https://'+v;
    return v;
  }
  function workerUrl(target){return WORKER+'?url='+encodeURIComponent(target)}
  function showBrowser(){
    var s=$('browserScreen');
    if(s){s.classList.add('active');s.style.display='flex';s.style.visibility='visible';s.style.opacity='1';s.style.pointerEvents='auto'}
    document.body.classList.add('mii-browser-open');
    if(typeof window.showScreen==='function'){try{window.showScreen('browser')}catch(e){}}
  }
  function status(show){
    var shell=document.querySelector('#browserScreen .browser-shell');
    if(!shell)return;
    var el=$('sqBrowserRouteStatus');
    if(!el){
      el=document.createElement('div');el.id='sqBrowserRouteStatus';
      el.innerHTML='<img src="LoadingBee.gif" alt=""><span>LOADING...</span>';
      shell.appendChild(el);
    }
    el.classList.toggle('show',!!show);
  }
  function navigate(raw){
    var v=clean(raw); if(!v)return false;
    showBrowser();
    var target, display;
    if(isUrl(v)){
      target=normalize(v); display=target;
    }else{
      target='https://html.duckduckgo.com/html/?q='+encodeURIComponent(v);
      display='https://duckduckgo.com/?q='+encodeURIComponent(v);
    }
    var addr=$('browserAddress');if(addr)addr.value=display;
    var frame=$('browserFrame');
    if(frame){
      status(true);
      try{frame.removeAttribute('srcdoc')}catch(e){}
      frame.setAttribute('referrerpolicy','no-referrer');
      frame.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-pointer-lock allow-presentation');
      frame.src=workerUrl(target);
    }
    return false;
  }
  function replaceControl(id){
    var old=$(id);if(!old)return null;
    var n=old.cloneNode(true);old.replaceWith(n);return n;
  }
  function bindFresh(){
    if(window.__sqSingleWorkerBound)return;
    window.__sqSingleWorkerBound=true;
    var addr=replaceControl('browserAddress');
    var go=replaceControl('browserGo');
    var refresh=replaceControl('browserRefresh');
    var back=replaceControl('browserBack');
    var home=replaceControl('homeSearch');
    var frame=$('browserFrame');
    if(addr){addr.placeholder='Search or enter a URL...';addr.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();e.stopPropagation();navigate(addr.value)}},true)}
    if(go)go.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();navigate(addr?addr.value:'')},true);
    if(home)home.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();e.stopPropagation();navigate(home.value)}},true);
    if(refresh)refresh.addEventListener('click',function(e){e.preventDefault();var f=$('browserFrame');if(f&&f.src){status(true);f.src=f.src}},true);
    if(back)back.addEventListener('click',function(e){e.preventDefault();try{$('browserFrame').contentWindow.history.back()}catch(err){}},true);
    if(frame){frame.addEventListener('load',function(){status(false)})}
    window.loadBrowser=navigate;
    window.miiOpenUrl=navigate;
    window.openMiiProxy=navigate;
    window.miiTikTokSearch=navigate;
    window.miiDuckGoLikeVideo=navigate;
    window.miiInternalSearch=navigate;
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',bindFresh,{once:true});else bindFresh();
  window.addEventListener('load',function(){bindFresh();window.loadBrowser=navigate;window.miiOpenUrl=navigate;window.openMiiProxy=navigate;window.miiTikTokSearch=navigate});
})();
</script>

<script id="squiddcore-jukebox-spotify-icons-js">
(function(){
  if(window.__sqSpotifyJukeIconsInstalled) return;
  window.__sqSpotifyJukeIconsInstalled=true;
  var shuffle=false;
  var repeatMode='all'; // off | all | one
  function $(id){return document.getElementById(id);}
  function activeIndex(){
    var row=document.querySelector('#sqTrackList .sq-track.active');
    if(row && row.dataset && row.dataset.index) return Number(row.dataset.index)||0;
    var audio=$('sqJukeboxAudio');
    var tracks=window.sqJukeTracks||[];
    if(audio && audio.src){
      var found=tracks.findIndex(function(t){return audio.src.indexOf((t.src||'').split('/').pop())>-1 || audio.src===t.src;});
      if(found>-1) return found;
    }
    return 0;
  }
  function tracks(){return window.sqJukeTracks||[];}
  function play(i){
    var list=tracks();
    if(!list.length) return;
    i=((i%list.length)+list.length)%list.length;
    if(window.sqJukePlayFixed) window.sqJukePlayFixed(i);
    else {
      var row=document.querySelector('#sqTrackList .sq-track[data-index="'+i+'"]');
      if(row) row.click();
    }
    setTimeout(iconize,40);
  }
  function randomNext(){
    var list=tracks(); if(!list.length) return 0;
    var cur=activeIndex();
    if(list.length<2) return cur;
    var n=cur;
    while(n===cur) n=Math.floor(Math.random()*list.length);
    return n;
  }
  function setIcon(btn, cls){
    if(!btn) return;
    if(btn.dataset.sqIcon===cls) return;
    btn.dataset.sqIcon=cls;
    btn.innerHTML='<i class="'+cls+'"></i>';
  }
  function ensureModeButtons(){
    var controls=document.querySelector('#sqJukeboxPanel .sq-juke-controls');
    if(!controls) return;
    if(!$('sqJukeSpotifyShuffle')){
      var sh=document.createElement('button');
      sh.id='sqJukeSpotifyShuffle';
      sh.type='button';
      sh.className='sq-juke-btn sq-mode-btn';
      sh.title='Shuffle';
      sh.setAttribute('aria-label','Shuffle');
      sh.onclick=function(e){
        e.preventDefault(); e.stopPropagation();
        shuffle=!shuffle;
        updateModeButtons();
      };
      controls.insertBefore(sh, $('sqPrev')||controls.firstChild);
    }
    if(!$('sqJukeSpotifyRepeat')){
      var rp=document.createElement('button');
      rp.id='sqJukeSpotifyRepeat';
      rp.type='button';
      rp.className='sq-juke-btn sq-mode-btn';
      rp.title='Repeat all';
      rp.setAttribute('aria-label','Repeat');
      rp.onclick=function(e){
        e.preventDefault(); e.stopPropagation();
        repeatMode = repeatMode==='all' ? 'one' : (repeatMode==='one' ? 'off' : 'all');
        updateModeButtons();
      };
      controls.appendChild(rp);
    }
  }
  function updateModeButtons(){
    var sh=$('sqJukeSpotifyShuffle'), rp=$('sqJukeSpotifyRepeat');
    if(sh){ sh.classList.toggle('active',shuffle); setIcon(sh,'ri-shuffle-line'); sh.title=shuffle?'Shuffle on':'Shuffle'; }
    if(rp){
      rp.classList.toggle('active',repeatMode!=='off');
      setIcon(rp, repeatMode==='one'?'ri-repeat-one-line':'ri-repeat-line');
      rp.title = repeatMode==='one' ? 'Repeat one' : (repeatMode==='all' ? 'Repeat all' : 'Repeat off');
    }
  }
  function iconize(){
    ensureModeButtons();
    var audio=$('sqJukeboxAudio');
    setIcon($('sqPrev'),'ri-skip-back-fill');
    setIcon($('sqNext'),'ri-skip-forward-fill');
    setIcon($('sqStop'),'ri-stop-fill');
    setIcon($('sqPlayPause'), audio && !audio.paused && !audio.ended ? 'ri-pause-fill' : 'ri-play-fill');
    updateModeButtons();
    var next=$('sqNext');
    if(next && !next.dataset.sqSpotifyNext){
      next.dataset.sqSpotifyNext='1';
      next.addEventListener('click',function(e){
        if(!shuffle) return;
        e.preventDefault(); e.stopImmediatePropagation();
        play(randomNext());
      },true);
    }
    var prev=$('sqPrev');
    if(prev && !prev.dataset.sqSpotifyPrev){
      prev.dataset.sqSpotifyPrev='1';
      prev.addEventListener('click',function(e){
        if(!shuffle) return;
        e.preventDefault(); e.stopImmediatePropagation();
        play(randomNext());
      },true);
    }
    var a=$('sqJukeboxAudio');
    if(a && !a.dataset.sqSpotifyEnded){
      a.dataset.sqSpotifyEnded='1';
      a.onended=function(){
        if(repeatMode==='one'){
          a.currentTime=0;
          a.play().catch(function(){});
        }else if(shuffle){
          play(randomNext());
        }else if(repeatMode==='all'){
          play(activeIndex()+1);
        }else{
          setTimeout(iconize,20);
        }
      };
      ['play','pause','ended','timeupdate','loadedmetadata'].forEach(function(ev){a.addEventListener(ev,function(){setTimeout(iconize,0);});});
    }
  }
  var oldInstall=window.sqJukeInstallPlayFix;
  window.sqJukeInstallPlayFix=function(){
    var r=oldInstall&&oldInstall.apply(this,arguments);
    setTimeout(iconize,0); setTimeout(iconize,150); return r;
  };
  var oldOpen=window.openSquiddJukebox;
  if(oldOpen){
    window.openSquiddJukebox=function(){
      var r=oldOpen.apply(this,arguments);
      setTimeout(iconize,0); setTimeout(iconize,150); setTimeout(iconize,500); return r;
    };
  }
  document.addEventListener('click',function(e){
    if(e.target && e.target.closest && e.target.closest('#sqJukeboxPanel')) setTimeout(iconize,0);
  },true);
  document.addEventListener('DOMContentLoaded',function(){setTimeout(iconize,300);});
  window.addEventListener('load',function(){setTimeout(iconize,700);});
  setInterval(function(){ if($('sqJukeboxPanel') && $('sqJukeboxPanel').classList.contains('open')) iconize(); },800);
})();
</script>


<style id="sq-browser-clean-final-css">
#sqBrowserTopFinal{display:flex;gap:8px;align-items:center;width:100%}
#sqBrowserAddressFinal{flex:1;min-width:0;padding:12px 14px;border:1px solid rgba(255,255,255,.16);background:#111;color:#fff;font:16px/1.2 Arial,sans-serif}
#sqBrowserGoFinal{padding:12px 18px;border:0;background:#ff68ad;color:#111;font-weight:800;cursor:pointer}
</style>
<script id="sq-browser-clean-final-js">
(function(){
'use strict';
var WORKER='https://proxytesting.xavierquailes.workers.dev/';
function $(id){return document.getElementById(id)}
function clean(v){return String(v||'').trim().replace(/^[\s'\"]+|[\s'\"]+$/g,'')}
function isUrl(v){return /^https?:\/\//i.test(v)||/^(?:[a-z0-9-]+\.)+[a-z]{2,}(?::\d+)?(?:[\/?#]|$)/i.test(v)}
function normalize(v){return /^https?:\/\//i.test(v)?v:'https://'+v}
function proxy(target){return WORKER+'?url='+encodeURIComponent(target)}
function showBrowser(){
  try{if(typeof window.showScreen==='function')window.showScreen('browser')}catch(e){}
  var s=$('browserScreen');if(s){s.classList.add('active');s.style.setProperty('display','flex','important');s.style.setProperty('visibility','visible','important');s.style.setProperty('opacity','1','important')}
}
function setLoading(on){
  var el=$('sqBrowserRouteStatus')||$('miicoreBrowserLoading');
  if(el)el.classList.toggle('show',!!on);
}
function go(value){
  var raw=clean(value);if(!raw)return;
  showBrowser();
  var target=isUrl(raw)?normalize(raw):'https://html.duckduckgo.com/html/?q='+encodeURIComponent(raw);
  var addr=$('sqBrowserAddressFinal');if(addr)addr.value=raw;
  var frame=$('browserFrame');if(!frame)return;
  try{frame.removeAttribute('srcdoc');frame.removeAttribute('sandbox')}catch(e){}
  frame.setAttribute('referrerpolicy','no-referrer');
  frame.style.setProperty('display','block','important');
  frame.style.setProperty('visibility','visible','important');
  frame.style.setProperty('opacity','1','important');
  setLoading(true);
  frame.onload=function(){setLoading(false)};
  frame.onerror=function(){setLoading(false)};
  frame.src='about:blank';
  setTimeout(function(){frame.src=proxy(target)},30);
  setTimeout(function(){setLoading(false)},12000);
}
function rebuildBrowserControls(){
  var oldTop=document.querySelector('#browserScreen .browser-top');
  if(oldTop&&!$('sqBrowserTopFinal')){
    var top=document.createElement('div');top.id='sqBrowserTopFinal';top.className='browser-top';
    top.innerHTML='<button class="browser-control" id="sqBrowserBackFinal">←</button><button class="browser-control" id="sqBrowserRefreshFinal">↻</button><input id="sqBrowserAddressFinal" type="text" placeholder="Search or enter a URL..."><button id="sqBrowserGoFinal">Go</button>';
    oldTop.replaceWith(top);
    $('sqBrowserGoFinal').onclick=function(e){e.preventDefault();go($('sqBrowserAddressFinal').value)};
    $('sqBrowserAddressFinal').onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();go(this.value)}};
    $('sqBrowserRefreshFinal').onclick=function(){var f=$('browserFrame');if(f&&f.src){setLoading(true);var u=f.src;f.src='about:blank';setTimeout(function(){f.src=u},20)}};
    $('sqBrowserBackFinal').onclick=function(){try{$('browserFrame').contentWindow.history.back()}catch(e){}};
  }
}
function rebuildHomeSearch(){
  var old=$('homeSearch');
  if(old&&!$('sqHomeSearchFinal')){
    var n=old.cloneNode(false);n.id='sqHomeSearchFinal';n.value=old.value||'';n.placeholder=old.placeholder||'Search the web...';
    old.replaceWith(n);
    n.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();go(n.value)}};
  }
  var btn=document.querySelector('[data-search-button],#homeSearchButton,.home-search button');
  if(btn&&!btn.dataset.sqCleanFinal){btn.dataset.sqCleanFinal='1';btn.onclick=function(e){e.preventDefault();go(($('sqHomeSearchFinal')||{}).value||'')}}
}
function init(){rebuildBrowserControls();rebuildHomeSearch();window.loadBrowser=go;window.squiddBrowserNavigate=go}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init,{once:true});else init();
window.addEventListener('load',function(){init();setTimeout(init,500)});
})();
</script>
</html>
