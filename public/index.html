<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <meta name="color-scheme" content="dark" />
  <title>SquiddCore Browser</title>
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <script src="/scram/scramjet.all.js"></script>
  <script src="/baremux/index.js"></script>
  <link rel="stylesheet" href="index.css" />
  <script src="register-sw.js" defer></script>
  <script src="search.js" defer></script>
  <script src="index.js" defer></script>
</head>
<body>
  <main class="browser-home">
    <form id="sj-form" class="browser-toolbar" autocomplete="off">
      <input id="sj-search-engine" value="https://duckduckgo.com/?q=%s&kae=d" type="hidden" />

      <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>

      <button class="chrome-btn home-btn" id="homeBtn" type="button" aria-label="Home" title="Home">
        <svg class="home-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M3 11.2 12 3l9 8.2v9.3a.5.5 0 0 1-.5.5H15v-6H9v6H3.5a.5.5 0 0 1-.5-.5z"/>
        </svg>
      </button>

      <label class="address-wrap" for="sj-address">
        <span class="lock-icon" aria-hidden="true">🔒</span>
        <input id="sj-address" type="text" value="https://duckduckgo.com" placeholder="Search DuckDuckGo or enter a URL..." aria-label="Search DuckDuckGo or enter a URL" spellcheck="false" autocomplete="off" />
      </label>

      <button class="chrome-btn" id="backBtn" type="button" aria-label="Back" title="Back">←</button>
      <button class="chrome-btn" id="refreshBtn" type="button" aria-label="Refresh" title="Refresh">↻</button>
      <button class="chrome-btn fullscreen-btn" id="fullscreenBtn" type="button" aria-label="Enter fullscreen" title="Fullscreen">
        <svg class="fullscreen-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path class="fs-enter" d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 0h2v6h-6v-2h4v-4z"/>
          <path class="fs-exit" d="M8 4h2v6H4V8h4V4zm6 0h2v4h4v2h-6V4zM4 14h6v6H8v-4H4v-2zm10 0h6v2h-4v4h-2v-6z"/>
        </svg>
      </button>
      <button class="chrome-btn go-btn" type="submit" aria-label="Go" title="Go">↵</button>
    </form>

    <section class="browser-stage" aria-label="Browser home">
      <div class="wallpaper" aria-hidden="true"></div>
      <div class="dim-layer" aria-hidden="true"></div>
      <div class="ready-card">
        <div class="globe" aria-hidden="true">🌐</div>
        <p>Proxy is ready! Search without<br />restrictions.</p>
      </div>
      <div class="status-wrap"><p id="sj-error"></p><pre id="sj-error-code"></pre></div>
    </section>
  </main>
    <div id="sj-loading-overlay" class="sj-loading-overlay" aria-hidden="true">
      <div class="sj-loading-card">
        <img src="LoadingBee.gif" alt="Loading" class="sj-loading-bee" />
        <div class="sj-loading-text">LOADING...</div>
        <div class="sj-loading-track"><span></span></div>
      </div>
    </div>

</body>
</html>
