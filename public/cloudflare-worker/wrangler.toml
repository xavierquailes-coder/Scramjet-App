name = "squiddcore-proxy"
main = "worker.js"
compatibility_date = "2026-07-01"

# After `wrangler deploy`, you'll get a URL like:
#   https://squiddcore-proxy.<your-subdomain>.workers.dev
#
# Put that URL into WORKER_URL in api/ddg.js, api/bing.js, api/google.js
# and api/search.js (all four use the same constant name so it's a quick
# find-and-replace).
